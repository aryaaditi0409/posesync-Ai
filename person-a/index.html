<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediaPipe Pose Upgrade</title>

<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        margin:30px;
        background:#f5f5f5;
    }

    h2{
        margin-bottom:10px;
    }

    #container{
        position:relative;
        display:inline-block;
        margin-top:20px;
        border:1px solid #ccc;
        background:white;
    }

    #image{
        display:block;
        max-width:900px;
        height:auto;
    }

    #canvas{
        position:absolute;
        left:0;
        top:0;
        pointer-events:none;
    }

    /* ✅ Status messages */
    #statusBox{
        margin-top:15px;
        padding:10px 14px;
        border-radius:6px;
        font-weight:bold;
        display:none;
    }

    #statusBox.success{
        background:#e6ffed;
        color:#1b7f3a;
        border:1px solid #2ecc71;
    }

    #statusBox.error{
        background:#ffe6e6;
        color:#a10000;
        border:1px solid #ff4d4d;
    }

    /* ✅ JSON display card */
    #jsonCard{
        margin-top:20px;
        background:white;
        border:1px solid #ddd;
        border-radius:10px;
        padding:15px;
        box-shadow:0 2px 8px rgba(0,0,0,0.05);
    }

    #jsonOutput{
        white-space:pre-wrap;
        font-family:Consolas, monospace;
        font-size:13px;
        margin-top:10px;
    }

    /* Buttons */
    button{
        margin-right:10px;
        padding:8px 12px;
        border:none;
        border-radius:6px;
        cursor:pointer;
        font-weight:bold;
    }

    #copyBtn{
        background:#3498db;
        color:white;
    }

    #downloadBtn{
        background:#2ecc71;
        color:white;
    }

    h3{
        margin-top:20px;
    }
</style>
</head>

<body>

<h2>MediaPipe Pose Detection (Upgraded)</h2>

<!-- Upload -->
<input type="file" id="upload" accept="image/*">

<!-- Status message -->
<div id="statusBox"></div>

<!-- Image + Canvas -->
<div id="container">
    <img id="image">
    <canvas id="canvas"></canvas>
</div>

<h3>Controls</h3>
<button id="copyBtn">Copy JSON</button>
<button id="downloadBtn">Download JSON</button>

<!-- JSON Output -->
<div id="jsonCard">
    <h3>Pose JSON</h3>
    <pre id="jsonOutput">Upload an image...</pre>
</div>

<!-- Angles -->
<div id="jsonCard">
    <h3>Joint Angles</h3>
    <pre id="angleOutput">Upload an image...</pre>
</div>
<div id="jsonCard">
    <h3>Test (window.extractPose)</h3>
    <pre id="testOutput">Waiting...</pre>
</div>

<!-- MediaPipe -->
<script type="module">
import {
    PoseLandmarker,
    FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/+esm";

const upload = document.getElementById("upload");
const image = document.getElementById("image");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const jsonOutput = document.getElementById("jsonOutput");
const angleOutput = document.getElementById("angleOutput");

const statusBox = document.getElementById("statusBox");
const copyBtn = document.getElementById("copyBtn");
const downloadBtn = document.getElementById("downloadBtn");

// 🔥 Global variable accessible anywhere in your app
let referenceKeypoints = {};

// store latest JSON for copy/download
let latestJSON = {};

const LANDMARK_NAMES = [
"nose",
"left_eye_inner",
"left_eye",
"left_eye_outer",
"right_eye_inner",
"right_eye",
"right_eye_outer",
"left_ear",
"right_ear",
"mouth_left",
"mouth_right",
"left_shoulder",
"right_shoulder",
"left_elbow",
"right_elbow",
"left_wrist",
"right_wrist",
"left_pinky",
"right_pinky",
"left_index",
"right_index",
"left_thumb",
"right_thumb",
"left_hip",
"right_hip",
"left_knee",
"right_knee",
"left_ankle",
"right_ankle",
"left_heel",
"right_heel",
"left_foot_index",
"right_foot_index"
];
const CONNECTIONS = [
    [11,13],[13,15],
    [12,14],[14,16],
    [11,12],
    [11,23],[12,24],
    [23,24],
    [23,25],[25,27],
    [24,26],[26,28],
    [27,31],[28,32]
];

// ✅ Show success / error messages
function showStatus(message, type){
    statusBox.style.display = "block";
    statusBox.textContent = message;
    statusBox.className = "";

    if(type === "success"){
        statusBox.classList.add("success");
    } else if(type === "error"){
        statusBox.classList.add("error");
    }
}

// ✅ Angle calculation (3-point geometry)
function calculateAngle(A, B, C){

    const BA = {
        x: A.x - B.x,
        y: A.y - B.y
    };

    const BC = {
        x: C.x - B.x,
        y: C.y - B.y
    };

    const dot = BA.x * BC.x + BA.y * BC.y;

    const magBA = Math.sqrt(BA.x**2 + BA.y**2);
    const magBC = Math.sqrt(BC.x**2 + BC.y**2);

    if(magBA === 0 || magBC === 0) return 0;

    let angle = Math.acos(dot / (magBA * magBC));
    angle = angle * (180 / Math.PI);

    return Number(angle.toFixed(1));
}
const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
);

const poseLandmarker = await PoseLandmarker.createFromOptions(
    vision,
    {
        baseOptions: {
            modelAssetPath:
                "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task"
        },
        runningMode: "IMAGE",
        numPoses: 1
    }
);
async function extractPose(imageFile){

    return new Promise((resolve, reject)=>{

        if(!imageFile){
            reject("No image supplied.");
            return;
        }

        const reader = new FileReader();

        reader.onload = async (e)=>{

            image.onload = ()=>{

    canvas.width = image.width;
    canvas.height = image.height;

    ctx.drawImage(image,0,0);

    try {
        const results = poseLandmarker.detect(image);

        const extracted = processPoseResults(results);

        resolve(extracted);

    } catch (err) {
        reject(err);
    }
};

            

            image.src = e.target.result;
        };

        reader.onerror = reject;
        reader.readAsDataURL(imageFile);
    });
}

window.extractPose = extractPose;

window.extractPose = extractPose;
function processPoseResults(results){

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(image, 0, 0, canvas.width, canvas.height);

    if (!results.landmarks || results.landmarks.length === 0) {
        showStatus("No person detected. Try a different photo.", "error");

        jsonOutput.textContent = "No pose detected.";
        angleOutput.textContent = "";

        referenceKeypoints = {};
        latestJSON = {};

        return null;
    }

    showStatus("Pose detected successfully! Ready to compare.", "success");

    
    

    // ✅ KEYPOINTS
    const poseJSON = {};

   const landmarks = results.landmarks[0];
   window.referenceLandmarks = results.landmarks?.[0] || null;
   // Draw green skeleton
ctx.strokeStyle = "lime";
ctx.lineWidth = 4;

CONNECTIONS.forEach(([a, b]) => {

    const p1 = landmarks[a];
    const p2 = landmarks[b];

    ctx.beginPath();
    ctx.moveTo(
        p1.x * canvas.width,
        p1.y * canvas.height
    );

    ctx.lineTo(
        p2.x * canvas.width,
        p2.y * canvas.height
    );

    ctx.stroke();

});

// Draw red joints
ctx.fillStyle = "red";

landmarks.forEach(lm => {

    const x = lm.x * canvas.width;
    const y = lm.y * canvas.height;

    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();

});

landmarks.forEach((lm, i) => {
        poseJSON[LANDMARK_NAMES[i]] = {
            x: Number((lm.x * canvas.width).toFixed(1)),
            y: Number((lm.y * canvas.height).toFixed(1))
        };
    });

    // ✅ ANGLES
    const angles = {
        left_elbow: calculateAngle(poseJSON.left_shoulder, poseJSON.left_elbow, poseJSON.left_wrist),
        right_elbow: calculateAngle(poseJSON.right_shoulder, poseJSON.right_elbow, poseJSON.right_wrist),

        left_shoulder: calculateAngle(poseJSON.left_elbow, poseJSON.left_shoulder, poseJSON.left_hip),
        right_shoulder: calculateAngle(poseJSON.right_elbow, poseJSON.right_shoulder, poseJSON.right_hip),

        left_hip: calculateAngle(poseJSON.left_shoulder, poseJSON.left_hip, poseJSON.left_knee),
        right_hip: calculateAngle(poseJSON.right_shoulder, poseJSON.right_hip, poseJSON.right_knee),

        left_knee: calculateAngle(poseJSON.left_hip, poseJSON.left_knee, poseJSON.left_ankle),
        right_knee: calculateAngle(poseJSON.right_hip, poseJSON.right_knee, poseJSON.right_ankle)
    };

    // ✅ GLOBAL STORAGE
    referenceKeypoints = {
        keypoints: poseJSON,
        angles: angles
    };

    latestJSON = poseJSON;

    // ✅ UI OUTPUT
    jsonOutput.textContent = JSON.stringify(referenceKeypoints, null, 4);

    let angleText = "";
    for(const j in angles){
        angleText += `${j}: ${angles[j]}°\n`;
    }
    angleOutput.textContent = angleText;

    return referenceKeypoints;
}

    
// -------------------------
// 📁 IMAGE UPLOAD HANDLER
// -------------------------
upload.addEventListener("change", async (event) => {

    const file = event.target.files[0];

    if(!file) return;

    try{

        const result = await window.extractPose(file);

        // Show what extractPose() returned
        document.getElementById("testOutput").textContent =
            JSON.stringify(result, null, 4);

    }
    catch(err){

        console.error(err);
        alert("Pose extraction failed.");

    }

});

// -------------------------
// 📋 COPY JSON BUTTON
// -------------------------
copyBtn.addEventListener("click", () => {

    if(!latestJSON || Object.keys(latestJSON).length === 0){
        alert("No JSON to copy!");
        return;
    }

    navigator.clipboard.writeText(
        JSON.stringify(referenceKeypoints, null, 4)
    );

    alert("JSON copied to clipboard!");
});

// -------------------------
// 💾 DOWNLOAD JSON BUTTON
// -------------------------
downloadBtn.addEventListener("click", () => {

    if(!referenceKeypoints || !referenceKeypoints.keypoints){
        alert("No data to download!");
        return;
    }

    const dataStr = JSON.stringify(referenceKeypoints, null, 4);
    const blob = new Blob([dataStr], { type: "application/json" });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "reference_pose.json";

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);
});
</script>
</body>
</html>
