<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Webcam Test</title>
  <style>
    body { background: #111; color: white; text-align: center; }
    video { transform: scaleX(-1); margin-top: 20px; border-radius: 12px; }
  </style>
</head>
<body>
  <h1>Can you see yourself?</h1>
  <video id="webcam" autoplay playsinline width="480" height="360"></video>

  <script>
    const video = document.getElementById("webcam");
    navigator.mediaDevices.getUserMedia({ video: true })
      .then((stream) => {
        video.srcObject = stream;
      })
      .catch((err) => {
        alert("Camera error: " + err.message);
      });
  </script>
</body>
</html>
